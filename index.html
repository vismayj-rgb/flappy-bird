<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Play the classic Flappy Bird game in your browser">
  <meta name="keywords" content="flappy bird, game, html5, canvas">
  <title>Flappy Bird - Play Now!</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>
  <div class="container">
    <header>
      <h1>🐦 Flappy Bird</h1>
      <p class="tagline">Tap to fly, avoid the pipes!</p>
    </header>

    <div class="game-wrapper">
      <canvas id="gameCanvas" width="400" height="600"></canvas>
      
      <div id="startScreen" class="overlay">
        <div class="overlay-content">
          <h2>Ready to Play?</h2>
          <p>Press <strong>SPACE</strong> or <strong>CLICK</strong> to jump</p>
          <button id="startBtn" class="btn btn-primary">Start Game</button>
          <div class="high-score">
            High Score: <span id="highScoreDisplay">0</span>
          </div>
        </div>
      </div>

      <div id="gameOverScreen" class="overlay hidden">
        <div class="overlay-content">
          <h2>Game Over!</h2>
          <div class="score-container">
            <p class="score">Score: <span id="finalScore">0</span></p>
            <p class="best-score">Best: <span id="bestScore">0</span></p>
          </div>
          <button id="restartBtn" class="btn btn-primary">Play Again</button>
          <button id="menuBtn" class="btn btn-secondary">Main Menu</button>
        </div>
      </div>

      <div class="game-ui">
        <div class="score-display">
          Score: <span id="currentScore">0</span>
        </div>
        <div id="livesDisplay" class="lives-display"></div>
        <div id="comboBadge" class="combo-badge" style="display:none;"></div>
        <div class="controls-hint">
          SPACE / CLICK to jump
        </div>
      </div>
    </div>

    <div class="info-panel">
      <div class="stats">
        <div class="stat-item">
          <span class="stat-label">Games Played:</span>
          <span class="stat-value" id="gamesPlayed">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Total Score:</span>
          <span class="stat-value" id="totalScore">0</span>
        </div>
      </div>
      
      <div class="settings">
        <h3>Settings</h3>
        <label class="setting-item">
           <input type="checkbox" id="soundToggle" checked>
           <span>Sound Effects</span>
        </label>
        <label class="setting-item">
          <input type="range" id="difficultySlider" min="1" max="5" value="3">
          <span>Difficulty: <span id="difficultyValue">Medium</span></span>
        </label>
        <label class="setting-item select-item">
          <span>Bird Skin:</span>
          <select id="skinSelector">
            <option value="CLASSIC">Classic Gold</option>
            <option value="RUBY">Ruby Red</option>
            <option value="EMERALD">Neon Emerald</option>
            <option value="VORTEX">Vortex Violet</option>
          </select>
        </label>
      </div>

      <div class="achievements">
        <h3>Achievements</h3>
        <div id="achievementsList" class="achievements-list">
          <!-- Dynamically loaded -->
        </div>
      </div>

      <div class="best-runs">
        <h3>🏆 Best Runs</h3>
        <table class="run-table">
          <thead>
            <tr>
              <th>#</th><th>Score</th><th>Difficulty</th><th>Date</th>
            </tr>
          </thead>
          <tbody id="bestRunsBody">
            <!-- Dynamically loaded -->
          </tbody>
        </table>
      </div>
    </div>

    <footer>
      <p>Made with ❤️ | <a href="https://github.com" target="_blank">View on GitHub</a></p>
    </footer>
  </div>

  <!-- Game Scripts -->
  <script src="src/config.js"></script>
  <script src="src/utils/storage.js"></script>
  <script src="src/utils/sound.js"></script>
  <script src="src/entities/bird.js"></script>
  <script src="src/entities/pipe.js"></script>
  <script src="src/entities/powerup.js"></script>
  <script src="src/managers/collision.js"></script>
  <script src="src/managers/score.js"></script>
  <script src="src/managers/achievement.js"></script>
  <script src="src/managers/runlog.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
